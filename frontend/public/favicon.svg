<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fond sombre arrondi -->
  <rect width="32" height="32" rx="6" fill="#020617"/>

  <!-- Corps du serpent (segments verts arrondis) -->
  <!-- Queue -->
  <rect x="4" y="20" width="6" height="6" rx="2" fill="#166534"/>
  <!-- Corps 3 -->
  <rect x="4" y="12" width="6" height="6" rx="2" fill="#15803d"/>
  <!-- Corps 2 -->
  <rect x="4" y="4"  width="6" height="6" rx="2" fill="#16a34a"/>
  <!-- Corps 1 -->
  <rect x="12" y="4" width="6" height="6" rx="2" fill="#22c55e"/>
  <!-- Tête -->
  <rect x="20" y="4" width="8" height="8" rx="3" fill="#86efac"/>

  <!-- Yeux sur la tête -->
  <circle cx="23" cy="7" r="1.2" fill="#0f172a"/>
  <circle cx="26" cy="7" r="1.2" fill="#0f172a"/>

  <!-- Langue -->
  <line x1="28" y1="8" x2="30" y2="10" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28" y1="8" x2="30" y2="7"  stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Nourriture (pomme rouge) -->
  <circle cx="24" cy="24" r="5" fill="#ef4444"/>
  <circle cx="22" cy="22" r="1.5" fill="#f87171" opacity="0.7"/>
  <!-- Tige -->
  <line x1="24" y1="19" x2="25" y2="17" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
